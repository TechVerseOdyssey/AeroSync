name: Python Release

# Wheel build matrix + PyPI / TestPyPI publish for the `aerosync`
# Python SDK (RFC-001 §13 #19, #20).
#
# Triggers:
#   - GitHub Release published → publishes to PyPI.
#   - Tag push `v*`            → builds wheels (validates the matrix
#                                without publishing).
#   - workflow_dispatch         → operator chooses pypi or testpypi.
#                                The default is `testpypi` so
#                                accidental UI clicks don't ship to
#                                production. Explicit `pypi` flips it.
#
# Auth: PyPI Trusted Publisher (OIDC). NO API tokens stored anywhere.
# The `id-token: write` permission is what lets `pypi-publish` mint a
# short-lived token from PyPI's OIDC endpoint at publish time. Both
# the `pypi` and `testpypi` GitHub Environments must have a matching
# Trusted Publisher pre-configured on the PyPI side — see
# `docs/python/RELEASE-CHECKLIST.md`.

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "pypi | testpypi"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon + Intel.
          - os: macos-13
            target: x86_64-apple-darwin
            manylinux: "off"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"

          # Linux glibc — manylinux_2_17 covers everything from
          # CentOS 7+ (PyPI's recommended baseline). aarch64 is built
          # under qemu inside the maturin-action docker image.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2_17"
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            manylinux: "2_17"

          # Linux musl — Alpine + scratch-based deployments.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            manylinux: "musllinux_1_1"

          # Windows — MSVC. ARM64 deferred to v0.2.1 (no maintainer
          # access to a Windows-on-ARM runner; PyPI's Windows ARM
          # share is also <1% of total Windows installs today).
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (build host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `--release` so we ship optimised wheels. `--out dist` lets
          # the upload-artifact step glob a single directory. The
          # abi3 wheel tagging comes from `aerosync-py/Cargo.toml`'s
          # `pyo3 = { features = ["abi3-py39"] }` — we don't pass it
          # again here.
          args: --release --out dist --manifest-path aerosync-py/Cargo.toml
          manylinux: ${{ matrix.manylinux }}
          docker-options: -e CARGO_NET_GIT_FETCH_WITH_CLI=true

      - name: Smoke-test wheel (host platform only)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Pick the wheel built for THIS host's interpreter; abi3
          # tagging means a single file matches every cp3{9..12}.
          python -m pip install --no-index --find-links dist aerosync
          python -c "import aerosync; print('aerosync', aerosync.version())"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/

  build-sdist:
    name: sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path aerosync-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish-testpypi:
    name: publish → TestPyPI
    needs: [build, build-sdist]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-22.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/aerosync
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # `skip-existing` lets us re-run the dry-run without bumping
          # the version each time. Production PyPI does NOT get this
          # flag — duplicate uploads there are a hard error.
          skip-existing: true

  publish-pypi:
    name: publish → PyPI
    needs: [build, build-sdist]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/aerosync
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
