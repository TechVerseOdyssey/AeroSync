name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            use-cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            use-cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `cross` spins up a Docker image with the correct musl C toolchain
      # (aarch64-linux-musl-gcc / x86_64-linux-musl-gcc) so that `cc`-based
      # crates like `libsqlite3-sys` and `ring` compile & link cleanly for
      # fully-static musl targets. This replaces the old manual install of
      # `gcc-aarch64-linux-gnu` (glibc), which produced undefined refs to
      # `open64`, `__memcpy_chk`, etc. against musl libc.
      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            BUILD=cross
          else
            BUILD=cargo
          fi
          $BUILD build --release --target ${{ matrix.target }} -p aerosync
          $BUILD build --release --target ${{ matrix.target }} -p aerosync-mcp

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="aerosync-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/aerosync" "$STAGE/"
          cp "target/${{ matrix.target }}/release/aerosync-mcp" "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $stage = "aerosync-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aerosync.exe" -Destination $stage
          Copy-Item "target/${{ matrix.target }}/release/aerosync-mcp.exe" -Destination $stage
          Copy-Item README.md, LICENSE, CHANGELOG.md -Destination $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$stage.zip").Hash.ToLower()
          Set-Content -Path "$stage.zip.sha256" -Value "$hash  $stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aerosync-${{ matrix.target }}
          path: |
            aerosync-*.tar.gz
            aerosync-*.tar.gz.sha256
            aerosync-*.zip
            aerosync-*.zip.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            See [`CHANGELOG.md`](https://github.com/TechVerseOdyssey/AeroSync/blob/master/CHANGELOG.md) for the full notes.

            ## Install

            **One-line (macOS/Linux):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/TechVerseOdyssey/AeroSync/master/install.sh | bash
            ```

            **Manual:** download the archive for your platform below, verify the SHA-256, extract, and put `aerosync` / `aerosync-mcp` on your `$PATH`.
