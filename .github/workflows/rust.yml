name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}
      - name: Build
        run: cargo build --workspace --all-targets --verbose
      - name: Test
        run: cargo test --workspace --all-targets --verbose

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-feature-matrix
      - name: Build workspace
        run: cargo build --workspace --verbose
      - name: Build workspace (HTTP only)
        run: cargo build --workspace --no-default-features --features http --verbose
      - name: Build workspace (QUIC only)
        run: cargo build --workspace --no-default-features --features quic --verbose
      - name: Build workspace (all features)
        run: cargo build --workspace --all-features --verbose
      - name: Test workspace (all features, Rust crates)
        run: cargo test --workspace --all-features --exclude aerosync-py --verbose

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: ./scripts/rust-gate.sh fmt

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy
      - run: ./scripts/rust-gate.sh clippy

  r2-wan-readiness:
    name: R2 WAN readiness (targeted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-r2-wan-readiness
      - name: Targeted R2 failure-path tests
        run: |
          cargo test -p aerosync --lib --no-default-features --features http,quic,wan-rendezvous test_peer_at_destination_without_token_is_config_error --verbose
          cargo test -p aerosync --lib --no-default-features --features http,quic,wan-rendezvous test_r2_peer_unseen_with_path_suffix_is_tagged --verbose
          cargo test -p aerosync --lib --no-default-features --features http,quic,wan-rendezvous test_r2_initiate_failure_is_tagged --verbose
          cargo test -p aerosync --lib --no-default-features --features http,quic,wan-rendezvous test_r2_signaling_close_before_punch_is_tagged --verbose
          cargo test -p aerosync --lib --no-default-features --features http,quic,wan-rendezvous test_r2_candidate_empty_is_tagged --verbose
      - name: Clippy gate (R2 feature slice)
        run: cargo clippy -p aerosync --tests --no-default-features --features http,quic,wan-rendezvous -- -D warnings

  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-msrv
      - name: Check workspace builds on MSRV
        run: cargo check --workspace --all-targets

  # We previously ran rustsec/audit-check@v2 here, but its policy was
  # too rigid for an application-layer crate: it failed CI on every
  # "unmaintained" / "unsound" advisory in transitive deps (gtk-sys,
  # paste, ring, rustls-pemfile, instant, …) which we cannot eliminate
  # without rewriting half the GUI / Tauri / warp stack. cargo-deny
  # below is now our single source of truth — by default it errors on
  # real vulnerabilities and treats unmaintained / unsound as warnings,
  # matching how the broader Rust ecosystem operates.

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features
