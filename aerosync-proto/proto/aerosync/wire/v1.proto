// AeroSync wire protocol — version 1.
//
// Canonical specification: docs/rfcs/RFC-002-receipt-protocol.md §6.3.
//
// This file is the SINGLE SOURCE OF TRUTH for the binary wire format
// AeroSync speaks under the ALPN string `aerosync/1`. Any change here is
// a wire-protocol change and MUST come with an RFC update.
//
// Field numbering rules (RFC-002 §6.3 + RFC-003 §4):
//   - 1-19    : system fields, set by the AeroSync engine.
//   - 20-99   : well-known optional fields owned by SDK.
//   - >= 100  : reserved for future system extensions.
//   - >= 200  : reserved for SDK use.
//   - >= 1000 : reserved forever for user-proto extensions.
//
// Compatibility scope: this is the FIRST formally specified wire
// version. The pre-alpha v0.1.0 ad-hoc serde_json encoding is treated
// as a closed pre-alpha and is intentionally NOT supported.

syntax = "proto3";
package aerosync.wire.v1;

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────
// Stream 0 (control): sender → receiver, bidirectional
// ─────────────────────────────────────────────────────────────────────

// Initial frame on the control stream. Negotiates the protocol version
// and advertises the sender's capability bitmask. See
// `aerosync::core::capabilities` (Rust side) for the bit layout.
message Handshake {
  // Wire-protocol version string, currently always "1". Receivers MUST
  // close the connection if they do not recognise this value.
  string protocol_version = 1;

  // Stable identifier for the sender node. Free-form in v0.2; signed
  // identity is deferred to RFC-005.
  string sender_node_id = 2;

  // HMAC-SHA256 proof of the shared auth token. Empty if auth is not
  // configured on this connection.
  bytes auth_proof = 3;

  // 4-byte capability bitmask, big-endian when serialised on the wire
  // (protobuf uint32 is little-endian on the wire but the Rust side
  // exposes a deterministic byte ordering via
  // `aerosync::core::capabilities::Capabilities::encode`).
  // See RFC-002 §6.5 for the bit layout.
  uint32 capabilities = 4;
}

// Per-transfer prelude. The sender emits exactly one TransferStart per
// receipt before opening any chunk streams.
message TransferStart {
  // UUID v7 generated by the sender — time-sorted and globally unique.
  string receipt_id = 1;

  // Display name (basename). Receivers may safe-rename for filesystem
  // compatibility but MUST preserve this in their history.
  string file_name = 2;

  // Total payload size in bytes.
  uint64 size_bytes = 3;

  // Lower-case hex SHA-256 of the payload, computed by the sender.
  string sha256 = 4;

  // Field 5 is reserved for the Metadata envelope defined in RFC-003.
  // It will be added in Week 4 as `Metadata metadata = 5;`. Until then
  // the field number is kept off-limits so a partial v0.2 build cannot
  // accidentally claim it. Field number matches RFC-002 §5 canonical.
  reserved 5;
  reserved "metadata";

  // Chunk size used for the per-chunk uni-streams (stream 4, 8, …).
  uint32 chunk_size = 6;
}

// Sender-initiated cancel. Carries the receipt_id so the receiver can
// route the cancellation to the right outstanding transfer.
message Cancel {
  string receipt_id = 1;
  string reason = 2;
}

// Lightweight liveness frame. `monotonic_ms` is the sender's
// monotonic-clock millisecond counter; receivers use it for jitter
// estimation, not absolute time.
message Heartbeat {
  uint64 monotonic_ms = 1;
}

// Envelope for everything sent on stream 0.
message ControlFrame {
  oneof body {
    Handshake handshake = 1;
    TransferStart transfer_start = 2;
    Cancel cancel = 3;
    Heartbeat heartbeat = 4;
  }
}

// ─────────────────────────────────────────────────────────────────────
// Stream 12 (receipt): receiver → sender, bidirectional
// ─────────────────────────────────────────────────────────────────────

// Periodic byte-level progress. RFC-002 Q1 (resolved): always sent when
// `chunk_size <= 1 MiB`; suppressed for very large chunks.
message BytesReceived {
  uint64 bytes = 1;
}

// "I have all the bytes and the SHA-256 matched." Triggers the SENDER
// state transition SENT → RECEIVED.
message Received {
  bool checksum_ok = 1;
  string sha256 = 2;
}

// Structured failure. `code` is machine-readable, `detail` is a
// human-readable diagnostic.
message Failed {
  ErrorCode code = 1;
  string detail = 2;
}

// Application-level acknowledgement: the receiver app called `ack()`.
// Triggers the SENDER state transition RECEIVED → PROCESSED.
message Acked {
  // Field 1 is reserved for ack-time `Metadata` (RFC-003 §4). Defined
  // in Week 4. Reserving the number ensures wire compatibility once
  // the field lands.
  reserved 1;
  reserved "metadata";
}

// Application-level rejection: the receiver app called `nack(reason)`.
// Triggers the SENDER state transition RECEIVED → FAILED.
message Nacked {
  string reason = 1;
}

// Envelope for everything sent on stream 12.
message ReceiptFrame {
  string receipt_id = 1;
  oneof body {
    BytesReceived bytes_received = 2;
    Received received = 3;
    Failed failed = 4;
    Acked acked = 5;
    Nacked nacked = 6;
  }
  // Wall-clock timestamp at which the receiver emitted this frame. We
  // park it at field 99 to keep room for additional body variants in
  // future minor revisions of wire/v1.
  google.protobuf.Timestamp at = 99;
}

// ─────────────────────────────────────────────────────────────────────
// Shared enums
// ─────────────────────────────────────────────────────────────────────

// Machine-readable error code carried by `Failed` frames. Numbers are
// frozen — never reuse, only add.
enum ErrorCode {
  ERROR_UNSPECIFIED = 0;
  ERROR_AUTH = 1;
  ERROR_CHECKSUM = 2;
  ERROR_DISK_FULL = 3;
  ERROR_PERMISSION = 4;
  ERROR_TIMEOUT = 5;
  ERROR_CANCELLED_REMOTE = 6;
  ERROR_INTERNAL = 99;
}

// Generic 7-state lifecycle, used by the `core::receipt` state machine
// as a side-agnostic view of where a receipt is in its lifecycle. The
// terminal variants (COMPLETED / FAILED) carry their concrete reason
// in adjacent fields of the `Receipt` Rust type, not on the wire.
//
// Exactly 7 variants — INITIATED is the natural zero/default for a
// freshly-created Receipt object so we don't need a separate
// STATE_UNSPECIFIED.
enum State {
  STATE_INITIATED = 0;
  STATE_STREAM_OPENED = 1;
  STATE_DATA_TRANSFERRED = 2;
  STATE_STREAM_CLOSED = 3;
  STATE_PROCESSING = 4;
  STATE_COMPLETED = 5;
  STATE_FAILED = 6;
}
