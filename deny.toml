# cargo-deny config — see https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
version = 2
# ─────────────────────────────────────────────────────────────────────
# Advisory ignore policy
# ─────────────────────────────────────────────────────────────────────
# Every entry here MUST have a clear reason that explains:
#   1. WHY the advisory is not exploitable in AeroSync's actual code paths
#   2. WHEN we expect to remove the ignore (which dependency upgrade unblocks it)
#
# v0.2.0 preparation status:
#   - quinn 0.10 → 0.11  .......... DONE (kills RUSTSEC-2026-0037)
#   - rustls 0.21 → 0.23 .......... DONE (kills RUSTSEC-2025-0009)
#   - rcgen 0.11 → 0.13 ........... DONE
#   - rustls-pemfile 1 → 2 ........ DONE (but warp still pulls pemfile 2.x)
#   - warp 0.3 → axum ............. PENDING (blocks the 5 ignores below)
#
# The remaining 5 advisories are all in the warp 0.3.7 transitive tree.
# They disappear the moment we rewrite src/core/server.rs from warp filters
# onto axum (planned as part of RFC-002 #5 HTTP SSE fallback work).
# ─────────────────────────────────────────────────────────────────────
ignore = [
  # ── rustls-webpki: name-constraint parsing bugs ──
  # Advisory text: "reachable only after signature verification and
  # requires misissuance to exploit." AeroSync uses self-signed certs
  # (HTTPS receiver) and pinned certs (QUIC); neither walks a CA chain
  # that could be misissued. We never assert URI / wildcard name
  # constraints. Reaches us only via warp's internal rustls 0.21 chain.
  { id = "RUSTSEC-2026-0098", reason = "name-constraint URI parsing; not on any AeroSync code path; blocked on warp 0.3 → axum (RFC-002 #5)" },
  { id = "RUSTSEC-2026-0099", reason = "name-constraint wildcard parsing; not on any AeroSync code path; blocked on warp 0.3 → axum (RFC-002 #5)" },
  # ── rustls-webpki: CRL distribution point matching ──
  # AeroSync does not consult Certificate Revocation Lists in either
  # the HTTPS or QUIC path. Self-signed / pinned cert verification
  # bypasses CRL checking entirely.
  { id = "RUSTSEC-2026-0049", reason = "CRL distribution point matching; AeroSync does not use CRLs; blocked on warp 0.3 → axum (RFC-002 #5)" },
  # ── rustls-pemfile: unmaintained ──
  # Our own code no longer depends on rustls-pemfile directly (we use
  # rustls-pki-types parsers), but warp 0.3.7's HTTPS stack still pulls
  # rustls-pemfile 2.x for its internal PEM loading. The crate is
  # feature-frozen but not vulnerable; the ignore disappears when warp
  # leaves the tree.
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; only reaches us via warp 0.3's HTTPS stack; blocked on warp 0.3 → axum (RFC-002 #5)" },
  # ── rand 0.8.5: unsound with custom logger calling rand::rng() ──
  # Advisory: triggers ONLY when a custom log::Log implementation calls
  # rand::thread_rng() at trace/warn level with a 64-KB-aligned reseed
  # event. AeroSync uses `tracing` (not `log`), has no custom logger,
  # and never calls rand from inside any logging code. rand is pulled
  # transitively via warp's tungstenite WebSocket stack.
  { id = "RUSTSEC-2026-0097", reason = "rand unsound only with custom log::Log calling rng(); AeroSync uses tracing with no such logger; blocked on warp 0.3 → axum (RFC-002 #5)" },
  # ── number_prefix 0.4.0: unmaintained ──
  # Pulled transitively by indicatif 0.17 for human-readable byte
  # formatting in the CLI progress bars. The crate is 30 lines of
  # utility code, has no network / crypto surface, and is not
  # vulnerable. Waits on indicatif upstream to drop the dep.
  { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained; utility crate with no security surface; reaches us only via indicatif CLI progress bars; blocked on indicatif dropping the dep upstream" },
]
# Default severity policy: error on real vulnerabilities, warn on
# unmaintained / unsound (these are informational and pervasive in
# the GUI/Tauri/warp ecosystems we transitively depend on).
unmaintained = "workspace"   # warn for workspace deps only
yanked = "warn"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "OpenSSL",
  "BSL-1.0",
  "CC0-1.0",
  # CDLA-Permissive-2.0: Community Data License Agreement (Permissive).
  # Used by webpki-roots 1.x (pulled via reqwest 0.12 for bundled root
  # CA list). Permissive, compatible with our MIT license.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Per-crate license clarifications: tell cargo-deny what SPDX expression
# to use when a crate's Cargo.toml lacks a `license` field but ships a
# LICENSE file. Each clarification names the file + a recognized hash so
# cargo-deny refuses to apply it if the file content drifts.
[[licenses.clarify]]
# ring 0.16 ships a custom LICENSE that combines ISC, MIT, and OpenSSL.
# Its Cargo.toml has no `license` field and the LICENSE text only scores
# ~0.66 against any single SPDX template, below our 0.8 confidence floor.
# Per ring's README and LICENSE: the code is dual-licensed ISC + MIT
# with the OpenSSL license applying to portions ported from BoringSSL.
# All three are in our allow list (or will be once we accept OpenSSL,
# which we already do).
name = "ring"
version = "0.16.*"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
  # Add abandoned / known-bad crates here as we find them.
]
skip = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
