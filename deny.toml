# cargo-deny config — see https://embarkstudios.github.io/cargo-deny/
[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
  # ── rustls-webpki 0.102.8 (pulled in via warp 0.3.7 → tokio-rustls 0.25 → rustls 0.22) ──
  # Both advisories below describe parsing bugs in the (unused-by-us)
  # name-constraint code path. The advisory text itself notes:
  #   "this bug is reachable only after signature verification and
  #    requires misissuance to exploit."
  # AeroSync's HTTPS receiver uses an auto-generated self-signed cert
  # (no CA chain to misissue from), and the QUIC path uses pinned certs
  # configured by the user — neither code path exercises X.509
  # name-constraint validation. There is no upstream path to upgrade
  # without dropping warp 0.3 (tracked in TODO.local.md as a v0.2.0
  # follow-up: migrate aerosync-core/src/server.rs to axum).
  { id = "RUSTSEC-2026-0098", reason = "name-constraint parsing in webpki; not on a code path AeroSync uses; blocked on warp 0.3 upgrade" },
  { id = "RUSTSEC-2026-0099", reason = "name-constraint parsing in webpki; not on a code path AeroSync uses; blocked on warp 0.3 upgrade" },
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "OpenSSL",
  "BSL-1.0",
  "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
  # Add abandoned / known-bad crates here as we find them.
]
skip = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
